name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go-test:
    name: ${{ matrix.rule }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rule: dupl
            go-version: 1.24.x
            working-directory: rules/go/dupl
            test-command: go test ./...
          - rule: gocognit
            go-version: 1.24.x
            working-directory: rules/go/gocognit
            test-command: go test ./...
          - rule: prealloc
            go-version: 1.24.x
            working-directory: rules/go/prealloc
            test-command: go test ./...
          - rule: unused
            go-version: 1.25.x
            working-directory: rules/go/unused
            test-command: go test ./unused ./internal/cmd/unused

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: false

      - name: Test
        working-directory: ${{ matrix.working-directory }}
        run: ${{ matrix.test-command }}
